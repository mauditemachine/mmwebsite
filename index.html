<!DOCTYPE html>
<html>
<head>
  <title>Maudite Machine</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;700&family=Russo+One&display=swap" rel="stylesheet">
  <style>
    /* Styles généraux */
    body, html {
      height: 100%;
      margin: 0;
      font-family: 'Open Sans', sans-serif;
      letter-spacing: -0.5px;
      background-color: #f4f4f4;
    }
    /* En-tête */
    .header {
      background-color: #34495e;
      color: white;
      text-align: left;
      padding: 2em;
      font-family: 'Russo One', sans-serif;
      text-transform: uppercase;
    }
    /* Contenu principal */
    .main-content {
      flex: 1;
      margin: 15px;
      padding: 15px;
      background-color: #fff;
      max-width: 900px;
      margin: auto;
      color: #333;
    }
    .bio {
      text-align: justify;
      margin-top: 20px;
      color: #333;
      max-width: 56.25em; /* 900px */
    }
    .social-links {
      font-size: 1.2em;
      font-weight: bold;
      margin-top: 20px;
      color: #333;
    }
    /* Pied de page */
    .footer {
      background-color: #333;
      color: white;
      text-align: center;
      padding: 0.5em;
      position: absolute;
      bottom: 0;
      width: 100%;
      font-size: 0.8em;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Maudite Machine</h1>
  </div>

  <div class="main-content">
    <div class="social-links">
      SoundCloud | Facebook
    </div>
    <div class="bio">
      <!-- Insère la bio complète ici -->
    </div>
  </div>

  <div class="footer">
    <p>Maudite Machine © 2023 | www.mauditemachine.com | All rights reserved.</p>
  </div>

</body>
</html>
