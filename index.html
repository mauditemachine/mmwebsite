<!DOCTYPE html>
<html>
<head>
  <title>Maudite Machine</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    /* Styles généraux */
    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
    }

    /* En-tête */
    .header {
      background-color: #50b3a2;
      color: white;
      text-align: center;
      padding: 1em;
    }

    /* Contenu principal */
    .main-content {
      margin: 15px;
      padding: 15px;
      background-color: #fff;
      text-align: center;
    }

    /* Pied de page */
    .footer {
      background-color: #333;
      color: white;
      text-align: center;
      padding: 1em;
    }

    /* Boutons et liens sociaux */
    .btn {
      background-color: #50b3a2;
      color: white;
      padding: 10px 20px;
      text-decoration: none;
      border-radius: 4px;
    }

    .btn:hover {
      background-color: #338771;
    }

    .social-icons {
      font-size: 24px;
      margin: 10px;
    } 

  </style>
</head>
<body>

  <div class="header">
    <h1>Maudite Machine</h1>
  </div>

  <div class="main-content">
    <a href="https://soundcloud.com/mauditemachine" target="_blank" class="social-icons"><i class="fab fa-soundcloud"></i></a>
    <a href="https://facebook.com/mauditemachine" target="_blank" class="social-icons"><i class="fab fa-facebook"></i></a>
  </div>

  <div class="footer">
    <p>Copyright 2023</p>
  </div>

</body>
</html>
