<!DOCTYPE html>
<html>
<head>
  <title>Maudite Machine</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    /* Styles généraux */
    html, body {
      height: 100%;
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background-color: #f4f4f4;
    }

    /* En-tête */
    .header {
      background-color: #50b3a2;
      color: white;
      text-align: center;
      padding: 2em;
      font-size: 2em;
    }

    /* Contenu principal */
    .main-content {
      flex: 1;
      margin: 15px;
      padding: 15px;
      background-color: #fff;
      text-align: center;
    }

    /* Pied de page */
    .footer {
      background-color: #333;
      color: white;
      text-align: center;
      padding: 1em;
      position: absolute;
      bottom: 0;
      width: 100%;
    }

    /* Boutons et liens sociaux */
    .social-icons {
      font-size: 48px; /* Icônes plus grandes */
      margin: 20px;   /* Plus d'espace autour des icônes */
    } 

  </style>
</head>
<body>
  <div class="header">
    <h1>Maudite Machine</h1>
  </div>
  
  <div class="main-content">
    <a href="https://soundcloud.com/mauditemachine" target="_blank" class="social-icons"><i class="fab fa-soundcloud"></i></a>
    <a href="https://facebook.com/mauditemachine" target="_blank" class="social-icons"><i class="fab fa-facebook"></i></a>
  </div>

  <div class="footer">
    <p>Copyright 2023</p>
  </div>

</body>
</html>
